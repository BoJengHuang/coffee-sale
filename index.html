<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>扶青慈善義賣 - 咖啡與蜂蜜</title>
    <!-- Modern Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Header Section -->
    <header class="header">
        <div class="header-overlay"></div>
        <div class="header-content">
            <h1>扶青慈善義賣</h1>
            <p>用一杯香醇的咖啡與天然蜂蜜，傳遞溫暖的心意。</p>
        </div>
    </header>

    <!-- Main Container -->
    <main class="container">

        <!-- Section: Single Products -->
        <section class="section-card" id="single-products-section">
            <div class="section-header">
                <h2>單品選購</h2>
                <p>挑選您喜歡的咖啡豆、濾掛包及天然蜂蜜。</p>
            </div>

            <div id="single-products-container">
                <!-- Dynamically generated by app.js -->
            </div>
        </section>

        <!-- Section: Gift Boxes -->
        <section class="section-card" id="gift-boxes-section">
            <div class="section-header">
                <h2>禮盒自由配</h2>
                <p>挑選禮盒方案，並自由搭配您心儀的內容物口味！</p>
            </div>

            <div class="add-gift-box-controls">
                <select id="gift-box-type-select" class="form-select">
                    <option value="" disabled selected>-- 選擇禮盒種類 --</option>
                    <option value="box1">禮盒1: 蜂蜜 + 蜂蜜 (1880 NTD)</option>
                    <option value="box2">禮盒2: 蜂蜜 + 咖啡豆 (1750 NTD)</option>
                    <option value="box3">禮盒3: 蜂蜜 + 咖啡濾掛包 (1600 NTD)</option>
                </select>
                <button id="add-gift-box-btn" class="btn btn-primary">➕ 新增禮盒</button>
            </div>

            <div id="gift-boxes-list">
                <!-- Gift boxes added by user will appear here -->
            </div>
        </section>

        <!-- Section: Cart Summary -->
        <section class="section-card cart-section">
            <div class="cart-summary">
                <h2>訂單總結</h2>
                <div class="cart-details" id="cart-details">
                    <!-- Detailed items will be injected here if needed, or just totals -->
                </div>

                <div class="price-row">
                    <span>商品總額:</span>
                    <span id="subtotal-price">0 NTD</span>
                </div>

                <div class="price-row shipping-row" id="shipping-row">
                    <span>運費 (未滿1000元):</span>
                    <span id="shipping-fee">65 NTD</span>
                </div>

                <div class="price-row total-row">
                    <span>總計金額:</span>
                    <span id="total-price" class="highlight-total">0 NTD</span>
                </div>

                <div class="checkout-actions">
                    <button id="generate-order-btn" class="btn btn-accent btn-large">📥 完成選購 (帶入明細回 Google 表單)</button>
                    <p class="help-text">點擊後會為您帶入明細，並跳轉回 Google 表單繼續填寫</p>
                </div>
            </div>
        </section>

    </main>

    <!-- Modal / Toast for Notification -->
    <div id="toast" class="toast hidden">
        <span id="toast-message">已複製訂單明細！</span>
    </div>

    <!-- Application Script -->
    <script src="app.js"></script>
</body>

</html>
